<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./src/style/main.css">

    <title>Alteração de Preço</title>
</head>

<body>

    <header>
        <h1>Alteração de Preço</h1>
    </header>

    <form id="mainForm">

        <div class="formRow">
            <span>Quantidade para calcular:</span> <input type="number" name="itemsToCalculate" id="itemsToCalculate"
                class="number" required min="1" step="0.01">
        </div>
        <div class="formRow">
            <span>Quantidade de items da promoção:</span> <input type="number" name="onSaleQuantity" id="onSaleQuantity"
                class="number" required min="0" step="0.01">
        </div>
        <div class="formRow">
            <span>Valor para alterar: </span> <input type="number" name="desiredValue" id="desiredValue" class="number"
                required min="0" step="0.01">
        </div>
        <div class="formRow" id="discountDiv">
            <span id="discountSpan">Desconto:</span> <input class="number" type="number" name="discount" id="discount"
                class="number" required min="0" step="0.01">
        </div>

        <div class="formRow hidden" id="valueOnSaleDiv">
            <span>Valor unitário na promoção:</span> <input type="number"
                name="valueOnSale" id="valueOnSale" class="number" min="0" required disabled step="0.01">
        </div>
        <div class="formRow hidden" id="originalValueDiv">
            <span>Valor original: </span> <input class="number" type="number" name="originalValue" id="originalValue" required disabled step="0.01">
        </div>
        <div>
            <span class="checkboxSpan">Não sei o valor do desconto</span> <input type="checkbox" name="checkboxInput" id="checkboxInput">
        </div>
        
        <div id="buttonDiv"><input type="submit" value="Calcular" id="calculateButton"></div>
    </form>

    <div id="result">
        <h1 class="hidden">Unidade --- Valor para Alterar --- Valor Final</h1>   
    </div>
    <script src="./src/scripts/main.js"></script>
</body>

</html>
